        function getCookie(name) {
            let c = null;
            if (document.cookie) {
                const cs = document.cookie.split(';');
                for (let i = 0; i < cs.length; i++) {
                    const C = cs[i].trim();
                    if (C.substring(0, name.length + 1) === (name + '=')) {
                        c = decodeURIComponent(C.substring(name.length + 1));
                        break;
                    }
                }
            }
            return c;
        }

                    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;

                    const line = document.createElement('div');
                    line.className = 'line';
                    line.style.left = `${p1.x}px`;
                    line.style.top = `${p1.y}px`;
                    line.style.width = `${length}px`;
                    line.style.transform = `rotate(${angle}deg)`;
                    imageWrapper.appendChild(line);
                }

                // सेंट्रोइड डॉट
                const cDot = document.createElement('div');
                cDot.className = 'centroid-dot';
                cDot.style.left = centroid.x + 'px';
                cDot.style.top = centroid.y + 'px';
                imageWrapper.appendChild(cDot);
            }

        async function captureAndSave(imageType) {
            // Ensure all rendering is complete
            await new Promise(resolve => setTimeout(resolve, 100));

            try {
                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = 880;
                finalCanvas.height = 600;
                const finalCtx = finalCanvas.getContext('2d');

                // Set background
                finalCtx.fillStyle = '#f8f8f8';
                finalCtx.fillRect(0, 0, 880, 600);

                // Draw blueprint image with correct aspect ratio
                const img = blueprintImage;
                const canvasAspectRatio = 880 / 600;
                const imgAspectRatio = img.naturalWidth / img.naturalHeight;
                let finalWidth, finalHeight, x, y;

                if (imgAspectRatio > canvasAspectRatio) {
                    finalWidth = 880;
                    finalHeight = finalWidth / imgAspectRatio;
                    x = 0;
                    y = (600 - finalHeight) / 2;
                } else {
                    finalHeight = 600;
                    finalWidth = finalHeight * imgAspectRatio;
                    y = 0;
                    x = (880 - finalWidth) / 2;
                }
                finalCtx.drawImage(img, x, y, finalWidth, finalHeight);

                // Calculate scaling factors
                const scaleX = 880 / imageWrapper.clientWidth;
                const scaleY = 600 / imageWrapper.clientHeight;

                // Draw elements based on image type
                if (imageType === 'centroid') {
                    drawCentroidElements(finalCtx, scaleX, scaleY);
                } else if (imageType === 'compass') {
                    drawCompassElements(finalCtx, scaleX, scaleY);
                } else if (imageType.includes('divided')) {
                    drawDivisionElements(finalCtx, scaleX, scaleY, imageType);
                }

                // Convert to data URL
                const imageData = finalCanvas.toDataURL('image/jpeg', 0.95);

                // Save to server
                const projectId = document.getElementById('projectId').value;
                const response = await fetch(`/save-project-image/${projectId}/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
                    body: JSON.stringify({ image_data: imageData, image_type: imageType })
                });

                if (!response.ok) throw new Error('Server error during save.');
                showSnackbar(`✅ ${imageType} image saved successfully!`);

            } catch (err) {
                showSnackbar(`❌ Error saving ${imageType}: ${err.message}`);
            }
        }

        function drawCentroidElements(ctx, scaleX, scaleY) {
            // Lines
            if (centroid) {
                ctx.strokeStyle = 'yellow';
                ctx.lineWidth = 4;
                for (let i = 0; i < points.length; i++) {
                    const p1 = points[i];
                    const p2 = points[(i + 1) % points.length];
                    ctx.beginPath();
                    ctx.moveTo(p1.x * scaleX, p1.y * scaleY);
                    ctx.lineTo(p2.x * scaleX, p2.y * scaleY);
                    ctx.stroke();
                }
            }

            // Dots
            ctx.fillStyle = 'yellow';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 1.5;
            points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x * scaleX, p.y * scaleY, 6, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();
            });

            // Centroid
            if (centroid) {
                ctx.fillStyle = 'red';
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(centroid.x * scaleX, centroid.y * scaleY, 8, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();
            }
        }

        function drawCompassElements(ctx, scaleX, scaleY) {
            const compass = document.getElementById('compassOverlay');
            if (!compass) return;

            // Calculate compass position and size
            const compassRect = compass.getBoundingClientRect();
            const wrapperRect = imageWrapper.getBoundingClientRect();

            const x = (compassRect.left - wrapperRect.left) * scaleX;
            const y = (compassRect.top - wrapperRect.top) * scaleY;
            const width = compassRect.width * scaleX;
            const height = compassRect.height * scaleY;

            // Create a temporary canvas to draw the rotated compass
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const tempCtx = tempCanvas.getContext('2d');

            // Draw the compass with rotation
            tempCtx.save();
            tempCtx.translate(width / 2, height / 2);
            tempCtx.rotate(compassRotation * Math.PI / 180);
            tempCtx.drawImage(compass, -width / 2, -height / 2, width, height);
            tempCtx.restore();

            // Draw the compass onto our main canvas
            ctx.drawImage(tempCanvas, x, y, width, height);
        }

        function drawDivisionElements(ctx, scaleX, scaleY, imageType) {
            const parts = parseInt(imageType.split('_')[1]);

            const cx = centroid.x * scaleX;
            const cy = centroid.y * scaleY;
            const radius = Math.min(880, 600) / 2 * 1.1 * scaleX;
            const angleStep = (2 * Math.PI) / parts;
            const rotationRadians = compassRotation * (Math.PI / 180);
            const labels = getCustomRotatedLabels(parts);

            ctx.strokeStyle = 'blue';
            ctx.lineWidth = 1.2 * scaleX;

            for (let i = 0; i < parts; i++) {
                const lineAngle = angleStep * i + rotationRadians;
                const x = cx + radius * Math.cos(lineAngle);
                const y = cy + radius * Math.sin(lineAngle);

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(x, y);
                ctx.stroke();

                if (labels[i]) {
                    const labelAngle = lineAngle + (angleStep / 2);

                    const labelRadius = radius - (80 * scaleX);
                    const labelX = cx + labelRadius * Math.cos(labelAngle);
                    const labelY = cy + labelRadius * Math.sin(labelAngle);
                    const labelText = labels[i];

                    ctx.font = `bold ${13 * scaleX}px Arial`;
                    const textMetrics = ctx.measureText(labelText);
                    const padding = 6 * scaleX;
                    const boxWidth = textMetrics.width + padding * 2;
                    const boxHeight = 20 * scaleY;

                    ctx.fillStyle = "green";
                    ctx.fillRect(labelX - boxWidth / 2, labelY - boxHeight / 2, boxWidth, boxHeight);

                    ctx.fillStyle = "white";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(labelText, labelX, labelY);
                }
            }
        }


        async function fetchGraphImage(divisions) {
            showSnackbar(`Generating graph for ${divisions} divisions...`);
            try {
                const projectId = document.getElementById('projectId').value;
                const endpoint = `/generate-graph-data/${projectId}/`;

                console.log(`DEBUG: Sending request for ${divisions} divisions`);
                console.log(`DEBUG: Centroid:`, centroid);
                console.log(`DEBUG: Compass rotation:`, compassRotation);

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken,
                    },
                    body: JSON.stringify({
                        divisions: divisions,
                        compass_rotation: compassRotation,
                        centroid: centroid
                    }),
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error(`Server error: ${errorText}`);
                    throw new Error(`Server could not generate graph for ${divisions} divisions.`);
                }

                const data = await response.json();

                if (data.error) {
                    console.error(`Backend error: ${data.error}`);
                    throw new Error(data.error);
                }

                if (!data.graph_dxf_base64) {
                    throw new Error(`Backend response for ${divisions}-part graph is missing image data.`);
                }

                showSnackbar(`✅ Graph for ${divisions} divisions generated.`);
                return data.graph_dxf_base64;

            } catch (error) {
                console.error("Error fetching graph image:", error);
                showSnackbar(`❌ Failed to generate graph for ${divisions} parts: ${error.message}`);
                throw error;
            }
        }

function attachRoomEvents() {
    const c = document.getElementById('roomCanvas');
    c.addEventListener('mousedown', onRoomMouseDown);
    c.addEventListener('mousemove', onRoomMouseMove);
    c.addEventListener('mouseup',   onRoomMouseUp);
}
function detachRoomEvents() {
    const c = document.getElementById('roomCanvas');
    c.removeEventListener('mousedown', onRoomMouseDown);
    c.removeEventListener('mousemove', onRoomMouseMove);
    c.removeEventListener('mouseup',   onRoomMouseUp);
}

function onRoomMouseDown(e) {
    isDrawing  = true;
    const rect = e.target.getBoundingClientRect();
    roomStartX = e.clientX - rect.left;
    roomStartY = e.clientY - rect.top;
}
function onRoomMouseMove(e) {
    if (!isDrawing) return;
    const rect  = e.target.getBoundingClientRect();
    const currX = e.clientX - rect.left;
    const currY = e.clientY - rect.top;

    const canvas = document.getElementById('roomCanvas');
    const ctx    = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw all confirmed rooms
    drawConfirmedRooms(ctx);

    // Draw current in-progress rectangle
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth   = 2;
    ctx.setLineDash([6, 3]);
    ctx.strokeRect(roomStartX, roomStartY, currX - roomStartX, currY - roomStartY);
    ctx.fillStyle = 'rgba(59, 130, 246, 0.08)';
    ctx.fillRect(roomStartX, roomStartY, currX - roomStartX, currY - roomStartY);
    ctx.setLineDash([]);
}
function onRoomMouseUp(e) {
    if (!isDrawing) return;
    isDrawing = false;

    const rect  = e.target.getBoundingClientRect();
    const endX  = e.clientX - rect.left;
    const endY  = e.clientY - rect.top;

    const w = endX - roomStartX;
    const h = endY - roomStartY;

    // Ignore tiny accidental clicks
    if (Math.abs(w) < 20 || Math.abs(h) < 20) return;

    // Store pending room — wait for type selection
    pendingRoom = {
        x: Math.min(roomStartX, endX),
        y: Math.min(roomStartY, endY),
        w: Math.abs(w),
        h: Math.abs(h),
    };

    showRoomTypePopup(e.clientX, e.clientY);
}

function confirmRoom(roomType) {
    document.getElementById('roomTypePopup').style.display = 'none';

    if (!pendingRoom) return;

    // Calculate which compass direction this room falls in
    const canvas    = document.getElementById('roomCanvas');
    const centerX   = canvas.width  / 2;
    const centerY   = canvas.height / 2;
    const roomCX    = pendingRoom.x + pendingRoom.w / 2;
    const roomCY    = pendingRoom.y + pendingRoom.h / 2;
    const direction = getRoomDirection(roomCX, roomCY, centerX, centerY);

    const room = {
        ...pendingRoom,
        name:      roomType,
        direction: direction,
        id:        Date.now()
    };

    markedRooms.push(room);
    pendingRoom = null;

    redrawAllRooms();
    renderRoomLabels();
}

}

    pendingRoom = null;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawConfirmedRooms(ctx);
}
// ─── Calculate compass direction of room relative to centroid ───
function getRoomDirection(rx, ry, cx, cy) {
    const dx    = rx - cx;
    const dy    = cy - ry;   // Y flip because canvas Y is downward
    const angle = Math.atan2(dy, dx) * (180 / Math.PI);
    // Convert to 0-360 clockwise from North
    const deg   = (90 - angle + 360) % 360;

    if (deg >= 337.5 || deg < 22.5)  return 'North';
    if (deg >= 22.5  && deg < 67.5)  return 'NorthEast';
    if (deg >= 67.5  && deg < 112.5) return 'East';
    if (deg >= 112.5 && deg < 157.5) return 'SouthEast';
    if (deg >= 157.5 && deg < 202.5) return 'South';
    if (deg >= 202.5 && deg < 247.5) return 'SouthWest';
    if (deg >= 247.5 && deg < 292.5) return 'West';
    return 'NorthWest';
}
// ─── Redraw all confirmed room rectangles on canvas ───
function drawConfirmedRooms(ctx) {
    const colors = {
        'Master Bedroom': '#7c3aed', 'Bedroom': '#8b5cf6',
        'Kitchen':        '#ea580c', 'Hall':    '#0891b2',
        'Living Room':    '#0284c7', 'Bathroom':'#0d9488',
        'Toilet':         '#0f766e', 'Study Room':'#1d4ed8',
        'Puja Room':      '#be185d', 'Store Room':'#6b7280',
        'Dining Room':    '#d97706', 'Garage':  '#374151',
    };

    markedRooms.forEach(room => {
        const color = colors[room.name] || '#3b82f6';
        ctx.strokeStyle = color;
        ctx.lineWidth   = 2;
        ctx.strokeRect(room.x, room.y, room.w, room.h);

        // Semi-transparent fill
        ctx.fillStyle = color + '18';
        ctx.fillRect(room.x, room.y, room.w, room.h);
    });
}

function redrawAllRooms() {
    const canvas = document.getElementById('roomCanvas');
    const ctx    = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawConfirmedRooms(ctx);
}

        function calculateCentroid() {
            if (points.length < 3) {
                showSnackbar("⚠️ Minimum 3 points required");
                return;
            }
            let area = 0, cx = 0, cy = 0;
            for (let i = 0; i < points.length; i++) {
                const p0 = points[i];
                const p1 = points[(i + 1) % points.length];
                const cross = (p0.x * p1.y) - (p1.x * p0.y);
                area += cross;
                cx += (p0.x + p1.x) * cross;
                cy += (p0.y + p1.y) * cross;
            }
            area /= 2;
            centroid = { x: cx / (6 * area), y: cy / (6 * area) };
            redrawDOMOverlays();
            showSnackbar("✅ Centroid Calculated.");
            captureAndSave('centroid');

            // ── NEW: centroid calculate hone ke baad selectMode band karo ──
            selectMode = false;
            imageWrapper.style.cursor = 'default';
        }

            compassRotation += (direction === 'left' ? -increment : increment);
            // Ensure compassRotation stays within 0-359 range
            compassRotation = (compassRotation % 360 + 360) % 360;

            const compass = document.getElementById("compassOverlay");
            compass.style.transform = `rotate(${compassRotation}deg)`;

            updateDegreeLabels();

            document.getElementById("deg-label-bottom").textContent = `${bottomDeg}°`;

        //-------------------------new code to replace the above code
        function getCustomRotatedLabels(parts, redLineAngle) {
            const labels = vastuLabelPresets[parts];
            if (!labels) return [];

            const total = labels.length;
            const degreesPerPart = 360 / total;

            // Ensure redLineAngle is normalized to 0-359.99
            const normalizedRedLineAngle = (redLineAngle % 360 + 360) % 360;

            if (parts === 32) {
                // For 32 parts, we want the compass's red North line (normalizedRedLineAngle)
                // to align precisely with the boundary between N4 and N5.

                // Let's assume in your `vastuLabelPresets[32]`:
                // N4 is at index 0 (0 to 11.25 degrees)
                // N5 is at index 1 (11.25 to 22.5 degrees)
                // So, the boundary between N4 and N5 is at the END of the N4 segment, which is 1 * degreesPerPart.

                // Calculate the default angle of the N4-N5 boundary in the *unrotated* labels array.
                // If N4 is at index 0, the boundary is at (index 0 + 1) * degreesPerPart = 1 * degreesPerPart.
                const presetN4N5BoundaryAngle = 1 * degreesPerPart; // This will be 11.25 degrees for 32 parts

                // Calculate the rotation needed to move this preset N4-N5 boundary angle
                // to where the 'normalizedRedLineAngle' (compass North) currently is.
                // If normalizedRedLineAngle is 0 (true North), and presetN4N5BoundaryAngle is 11.25,
                // we need to rotate the Vastu chart counter-clockwise by 11.25 degrees to align them.
                // (target_angle - current_angle + 360) % 360
                const rotationAmount = (normalizedRedLineAngle - presetN4N5BoundaryAngle + 360) % 360;

                // Convert this rotation angle into the number of segments to shift the array.
                // If rotationAmount is positive, we shift elements from end to start (clockwise rotation of chart).
                // If rotationAmount is effectively negative (e.g., small positive value after +360),
                // it means we shift elements from start to end (counter-clockwise rotation of chart).
                const shift = Math.round(rotationAmount / degreesPerPart);

                // Apply the circular shift to the labels array.
                // The `(shift % total + total) % total` ensures the shift is always a positive index.
                const effectiveShift = (shift % total + total) % total;

                const rotated = [...labels.slice(effectiveShift), ...labels.slice(0, effectiveShift)];
                return rotated;

            } else {
                // Standard rotation for other parts (8, 16, etc.)
                // For these, we typically align the *center* of the 'N' segment with the red line.
                // Assuming 'N' is labels[0] and its center is at degreesPerPart / 2 in the unrotated array.
                const presetNorthCenterAngle = degreesPerPart / 2;
                const rotationAmount = (normalizedRedLineAngle - presetNorthCenterAngle + 360) % 360;
                const shift = Math.round(rotationAmount / degreesPerPart);
                const effectiveShift = (shift % total + total) % total;

                const rotated = [...labels.slice(effectiveShift), ...labels.slice(0, effectiveShift)];
                return rotated;
            }
        }

            const cx = centroid.x;

            const angleStep = (2 * Math.PI) / parts; // Angle in radians for each segment
            const radius = Math.min(canvas.width, canvas.height) / 2 * 1.2;

            // `compassRotation` is the rotation of the compass overlay image
            // It dictates how the 0-degree mark (East) of the *overlay* is rotated.
            // When drawing lines, `rotationOffset` rotates the entire set of division lines
            // relative to the canvas's 0-degree (East).
            const rotationOffsetRadians = (Math.PI / 180) * compassRotation;

            // Get labels. Note: The `getCustomRotatedLabels` function doesn't need `redLineAngle` anymore.
            let labels = getCustomRotatedLabels(parts);

            // Draw blue division lines
            ctx.strokeStyle = "blue";
            ctx.lineWidth = 1.2;

            for (let i = 0; i < parts; i++) {
                // The angle for the start of the current division line
                const currentLineAngleRadians = angleStep * i + rotationOffsetRadians;
                const x = cx + radius * Math.cos(currentLineAngleRadians);
                const y = cy + radius * Math.sin(currentLineAngleRadians);

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(x, y);
                ctx.stroke();

                // Draw labels in the middle of each segment
                if (labels && labels[i]) {
                    const labelAngleRadians = currentLineAngleRadians + (angleStep / 2); // Center of the segment
                    const maxRadius = Math.min(canvas.width, canvas.height) / 2;
                    const labelRadius = maxRadius - 60; // Adjust label radius as needed

                    const labelX = cx + labelRadius * Math.cos(labelAngleRadians);
                    const labelY = cy + labelRadius * Math.sin(labelAngleRadians);

                    const labelText = labels[i];
                    ctx.font = "bold 13px Arial";
                    const textMetrics = ctx.measureText(labelText);
                    const padding = 6;
                    const boxWidth = textMetrics.width + padding * 2;
                    const boxHeight = 20;

                    ctx.fillStyle = "green";
                    ctx.fillRect(labelX - boxWidth / 2, labelY - boxHeight / 2, boxWidth, boxHeight);

        function downloadBlueprint() {

                scale: 2 // Capture at a higher resolution

                // === NAYA CODE START ===
                // imageContainer ka on-screen aspect ratio nikalna
                const containerWidth = imageContainer.clientWidth;
                const containerHeight = imageContainer.clientHeight;
                // === NAYA CODE END ===

                const form = document.createElement("form");
                form.method = "POST";
                form.action = "/download-blueprint/";

                const imgInput = document.createElement("input");
                imgInput.name = "image_data";

                const csrfInput = document.createElement("input");
                csrfInput.type = "hidden";
                csrfInput.name = "csrfmiddlewaretoken";
                csrfInput.value = csrfToken;
                form.appendChild(csrfInput);

                document.body.appendChild(form);
                form.submit();
            });
        }

        window.addEventListener("load", () => {
            const img = document.getElementById("blueprintImage");
            const wrapper = document.getElementById("imageWrapper");

            // Wait until image is loaded to get accurate dimensions
            img.onload = () => {
                const imgWidth = img.naturalWidth;
                const imgHeight = img.naturalHeight;

                // Check if vertical image
                if (imgHeight > imgWidth) {
                    // Rotate image
                    img.style.transform = "rotate(90deg)";
                    img.style.transformOrigin = "top left";

                    // Set size to fit rotated image
                    img.style.position = "absolute";
                    img.style.left = "0";
                    img.style.top = "0";

                    // Swap width and height
                    img.style.width = imgHeight + "px";
                    img.style.height = imgWidth + "px";

                    // Expand wrapper to fit rotated image
                    wrapper.style.width = imgHeight + "px";
                    wrapper.style.height = imgWidth + "px";
                }
            };
        });

            rotationControls.insertBefore(toggle, rotationOptions);

                    rotationOptions.style.display = 'block';

                }
            });
            updateDegreeLabels(); // Call once on load to set initial labels correctly
        });

        function drawGrid() {
            const canvas = document.getElementById("gridCanvas");
            const image = document.getElementById("blueprintImage");

            canvas.width = image.clientWidth;
            canvas.height = image.clientHeight;

            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const gridSize = 20; // 20px = 1x1 unit block

            ctx.strokeStyle = "#ccc";
            ctx.lineWidth = 0.5;

            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            canvas.style.display = "block"; // make it visible
        }
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const canvas = document.getElementById("divisionCanvas");
            // const canvas = document.getElementById("divisionCanvas");
            const btn = document.getElementById("calculateCenterBtn");

            if (!canvas) {
                console.error("Canvas not found!");
                return;
            }

            if (!btn) {
                console.error("Button not found!");
                return;
            }

            const ctx = canvas.getContext("2d");

            let plotPoints = [];

            window.plotPoints = plotPoints;

            canvas.addEventListener("click", function (event) {

                const rect = canvas.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;

                plotPoints.push([x, y]);

                console.log("Point Added:", x, y);
                console.log("Total Points:", plotPoints.length);

                ctx.fillStyle = "red";
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            btn.addEventListener("click", function () {

                console.log("Button clicked");
                console.log("Points before checking:", plotPoints);

                if (plotPoints.length < 3) {
                    alert("Minimum 3 points required");
                    return;
                }

                fetch("/calculate-center/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken")
                    },
                    body: JSON.stringify({ points: plotPoints })
                })
                    .then(response => response.json())
                    .then(data => {

                        console.log("Server response:", data);

                        if (data.error) {
                            alert(data.error);
                            return;
                        }

                        const centerX = data.center_x;
                        const centerY = data.center_y;

                        ctx.fillStyle = "blue";
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, 6, 0, Math.PI * 2);
                        ctx.fill();
                    });
            });

            // CSRF Function (VERY IMPORTANT for Django)
            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }

        });
    </script>
