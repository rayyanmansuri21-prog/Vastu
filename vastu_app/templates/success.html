{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Status</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .success-box {
            text-align: center;
            background: #fff;
            padding: 30px 50px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
        }

        .success-box img {
            width: 80px;
            margin-bottom: 20px;
        }

        .success-box h1 {
            font-size: 24px;
            color: #2e7d32;
        }
    </style>

    <!-- Auto redirect after 2.5 sec -->
    <script>
        setTimeout(() => {
            window.location.href = "{% url 'dashboard' %}"; 
        }, 2500);
    </script>
</head>
<body>
    <div class="success-box">
        <img src="{% static 'images/check_icon.png' %}" alt="Success Icon">
        <h1>Login Successful!</h1>
    </div>
</body>
</html>
